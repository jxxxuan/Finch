version: '3.8'

services:
  # 1. API Server Service (Constantly running FastAPI data service)
  api-server:
    build: .
    image: finch-app:latest
    container_name: finch-api
    restart: always
    network_mode: "host"
    volumes:
      # Bind mounts matching your Linux server environment paths
      - /mnt/predictor/stock_data:/mnt/predictor/stock_data
      - /home/jxxxuan/share/test:/home/jxxxuan/share/test
      - /home/jxxxuan/gdrive:/home/jxxxuan/gdrive
    env_file:
      - .env

  # 2. Spider & Backup Job Runner (Triggered by Ofelia scheduler)
  spider-job:
    image: finch-app:latest
    container_name: finch-spider-runner
    restart: always
    network_mode: "host"
    volumes:
      - /mnt/predictor/stock_data:/mnt/predictor/stock_data
      - /home/jxxxuan/share/test:/home/jxxxuan/share/test
      - /home/jxxxuan/gdrive:/home/jxxxuan/gdrive
    env_file:
      - .env
    command: ["tail", "-f", "/dev/null"]
    labels:
      - "ofelia.enabled=true"
      - "ofelia.job-local.spider-run.schedule=0 1 * * *"  # Run daily at 1:00 AM
      - "ofelia.job-local.spider-run.command=python main.py"

  # 3. Docker-Native Scheduler (Ofelia - consumes ~5MB RAM)
  scheduler:
    image: mcuadros/ofelia:latest
    container_name: finch-scheduler
    restart: always
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - spider-job
